<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <!-- Для скидання кешу міняй номер версії тут при кожному апдейті: v=1.0.2 -->
    <meta name="app-version" content="v=1.0.2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxing Manual Timer</title>
    <style>
        /* Базові стилі та темна атлетична тема */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Головний контейнер таймера */
        .timer-card {
            background-color: #1e1e1e;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 750px;
            border-radius: 24px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2d2d2d;
        }

        @media (max-width: 480px) {
            .timer-card {
                border-radius: 0;
                max-height: 100vh;
            }
        }

        /* Кнопка-шестерня */
        .settings-gear {
            position: absolute;
            top: 24px;
            right: 24px;
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #a0a0a0;
            transition: color 0.2s, transform 0.2s;
        }

        .settings-gear:hover {
            color: #ffffff;
            transform: rotate(45deg);
        }

        /* Індикатори стану та часу */
        .status-indicator {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 40px;
            text-transform: uppercase;
            color: #ff4500; /* Колір за замовчуванням - бойовий */
        }

        .status-indicator.rest {
            color: #00cc66; /* Зелений для відпочинку */
        }

        /* Величезні цифри часу */
        .huge-digits {
            font-size: 7.5rem;
            font-weight: 800;
            line-height: 1;
            font-variant-numeric: tabular-nums; /* Щоб цифри не стрибали при зміні */
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .huge-digits:active {
            transform: scale(0.95);
        }

        /* Анімація блимання, коли час вийшов */
        .blink {
            animation: flash 1s infinite;
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .round-counter {
            font-size: 1.3rem;
            color: #a0a0a0;
            font-weight: 500;
            margin-bottom: 40px;
        }

        /* Додаткова міні-кнопка Паузи/Старту */
        .play-pause-btn {
            background-color: #2d2d2d;
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Розтягнута головна кнопка перемикання */
        .stretched-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 16px;
            background-color: #ff4500;
            color: #ffffff;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
            transition: transform 0.1s, background-color 0.2s;
        }

        .stretched-btn:active {
            transform: scale(0.98);
        }

        /* Модальне вікно налаштувань */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.2s;
        }

        .modal.hidden {
            display: none;
            opacity: 0;
        }

        .modal-content {
            background-color: #1e1e1e;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px 24px;
            position: relative;
            border: 1px solid #333;
        }

        .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            font-size: 2rem;
            color: #a0a0a0;
            cursor: pointer;
        }

        .modal h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* Перемикач мови */
        .lang-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .lang-btn {
            flex: 1;
            padding: 10px;
            background-color: #2d2d2d;
            border: 1px solid #444;
            color: #a0a0a0;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
        }

        .lang-btn.active {
            background-color: #ff4500;
            color: #fff;
            border-color: #ff4500;
        }

        /* Кастомізація інпутів часу */
        .settings-group {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-group label {
            color: #d0d0d0;
            font-size: 0.95rem;
        }

        .settings-group input {
            width: 80px;
            background-color: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
        }

        hr {
            border: 0;
            height: 1px;
            background: #333;
            margin: 20px 0;
        }

        /* Інструкція */
        .instructions h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #ff4500;
        }

        .instructions p {
            font-size: 0.9rem;
            color: #b0b0b0;
            line-height: 1.4;
        }

        /* Футер з авторством */
        .modal-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
        }

        .modal-footer a {
            color: #a0a0a0;
            text-decoration: none;
            font-weight: 600;
        }

        .modal-footer a:hover {
            text-decoration: underline;
            color: #ff4500;
        }
    </style>
</head>
<body>

    <div class="timer-card">
        <!-- Кнопка налаштувань у кутку -->
        <button id="settings-btn" class="settings-gear">⚙️</button>

        <!-- Етап: Раунд / Відпочинок -->
        <div id="status-display" class="status-indicator">Раунд</div>

        <!-- Головний таймер (можна тапнути для паузи) -->
        <div id="time-display" class="huge-digits">03:00</div>

        <!-- Номер раунду -->
        <div id="round-display" class="round-counter">Раунд 1/12</div>

        <!-- Кнопка Паузи/Старту -->
        <button id="play-pause-btn" class="play-pause-btn">СТАРТ</button>

        <!-- Велика розтягнута кнопка ручного перемикання -->
        <button id="next-step-btn" class="stretched-btn">НАСТУПНИЙ ЕТАП</button>
    </div>

    <!-- Модалка налаштувань -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <button id="close-modal-btn" class="close-btn">×</button>
            
            <h2 id="modal-title">Налаштування</h2>
            
            <!-- Вибір мови -->
            <div class="lang-switch">
                <button id="lang-ua" class="lang-btn active">УКР</button>
                <button id="lang-en" class="lang-btn">ENG</button>
            </div>

            <!-- Конфігурація часу -->
            <div class="settings-group">
                <label id="label-work" for="input-work">Час раунду (сек):</label>
                <input type="number" id="input-work" value="180" min="5">
            </div>
            <div class="settings-group">
                <label id="label-rest" for="input-rest">Час відпочинку (сек):</label>
                <input type="number" id="input-rest" value="60" min="5">
            </div>
            <div class="settings-group">
                <label id="label-rounds" for="input-rounds">Кількість раундів:</label>
                <input type="number" id="input-rounds" value="12" min="1">
            </div>

            <hr>

            <!-- Блок інструкції -->
            <div class="instructions">
                <h3 id="instruction-title">Інструкція</h3>
                <p id="instruction-text">Таймер рахує час поточного етапу. Коли час вийде, він почне блимати. Натисніть велику кнопку «НАСТУПНИЙ ЕТАП» внизу, щоб вручну перейти до наступного раунду чи відпочинку.</p>
            </div>

            <!-- Авторство у підвалі модалки -->
            <div class="modal-footer">
                <span id="label-author">Автор:</span> <a href="https://github.com/твій-профіль" target="_blank">Klikoduev</a>
            </div>
        </div>
    </div>

    <script>
        // 1. Локалізація (Двомовність)
        const translations = {
            ua: {
                work: "РАУНД",
                rest: "ВІДПОЧИНОК",
                round: "Раунд",
                nextBtn: "НАСТУПНИЙ ЕТАП",
                settingsTitle: "Налаштування",
                instructionsTitle: "Інструкція",
                instruction: "Таймер рахує час поточного етапу. Коли час вийде, він почне блимати. Натисніть велику кнопку «НАСТУПНИЙ ЕТАП» внизу, щоб вручну перейти до наступного раунду чи відпочинку.",
                workLabel: "Час раунду (сек):",
                restLabel: "Час відпочинку (сек):",
                roundsLabel: "Кількість раундів:",
                authorLabel: "Автор:",
                start: "СТАРТ",
                pause: "ПАУЗА",
                finished: "ТРЕНУВАННЯ ЗАВЕРШЕНО!"
            },
            en: {
                work: "ROUND",
                rest: "REST",
                round: "Round",
                nextBtn: "NEXT STEP",
                settingsTitle: "Settings",
                instructionsTitle: "Instructions",
                instruction: "The timer counts down the current phase. When time runs out, it will blink. Press the large 'NEXT STEP' button at the bottom to manually transition to the next round or rest period.",
                workLabel: "Round time (sec):",
                restLabel: "Rest time (sec):",
                roundsLabel: "Total rounds:",
                authorLabel: "Author:",
                start: "START",
                pause: "PAUSE",
                finished: "WORKOUT FINISHED!"
            }
        };

        // 2. Стани таймера за замовчуванням
        let workTime = 180; 
        let restTime = 60;
        let totalRounds = 12;
        
        let currentRound = 1;
        let isWorkPhase = true; 
        let timeLeft = workTime;
        let timerId = null;
        let isRunning = false;
        let currentLang = 'ua';

        // 3. Елементи інтерфейсу
        const statusDisplay = document.getElementById('status-display');
        const timeDisplay = document.getElementById('time-display');
        const roundDisplay = document.getElementById('round-display');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const nextStepBtn = document.getElementById('next-step-btn');
        
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        
        const langUaBtn = document.getElementById('lang-ua');
        const langEnBtn = document.getElementById('lang-en');
        const inputWork = document.getElementById('input-work');
        const inputRest = document.getElementById('input-rest');
        const inputRounds = document.getElementById('input-rounds');

        // Текстові мітки модалки
        const modalTitle = document.getElementById('modal-title');
        const labelWork = document.getElementById('label-work');
        const labelRest = document.getElementById('label-rest');
        const labelRounds = document.getElementById('label-rounds');
        const instructionTitle = document.getElementById('instruction-title');
        const instructionText = document.getElementById('instruction-text');
        const labelAuthor = document.getElementById('label-author');

        // 4. Синтезатор звуку (Електронний гонг)
        function playSound(isEndBell = false) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (isEndBell) {
                    // Симуляція потрійного жорсткого удару гонгу
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(587.33, ctx.currentTime); // Ре
                    gain.gain.setValueAtTime(0.4, ctx.currentTime);
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                    osc.stop(ctx.currentTime + 0.6);
                } else {
                    // Звичайний писк старту/кліку
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, ctx.currentTime);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                    osc.stop(ctx.currentTime + 0.15);
                }
            } catch (e) {
                console.log("Аудіо контекст заблоковано браузером. Потрібен перший клік.");
            }
        }

        // 5. Форматування часу (00:00)
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        // Оновлення основного екрана
        function updateUI() {
            timeDisplay.textContent = formatTime(timeLeft);
            
            if (currentRound > totalRounds) {
                statusDisplay.textContent = translations[currentLang].finished;
                roundDisplay.textContent = "";
                timeDisplay.textContent = "00:00";
                pauseTimer();
                return;
            }

            if (isWorkPhase) {
                statusDisplay.textContent = translations[currentLang].work;
                statusDisplay.classList.remove('rest');
            } else {
                statusDisplay.textContent = translations[currentLang].rest;
                statusDisplay.classList.add('rest');
            }

            roundDisplay.textContent = `${translations[currentLang].round} ${currentRound}/${totalRounds}`;
            
            // Якщо час вийшов — вмикаємо блимання
            if (timeLeft === 0) {
                timeDisplay.classList.add('blink');
            } else {
                timeDisplay.classList.remove('blink');
            }
        }

        // 6. Логіка роботи таймера (Плідна щосекундна робота)
        function tick() {
            if (timeLeft > 0) {
                timeLeft--;
                if (timeLeft === 0) {
                    playSound(true); // Гучний сигнал завершення етапу
                }
                updateUI();
            }
        }

        function startTimer() {
            if (!isRunning && currentRound <= totalRounds) {
                isRunning = true;
                timerId = setInterval(tick, 1000);
                playPauseBtn.textContent = translations[currentLang].pause;
                playSound();
            }
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timerId);
            playPauseBtn.textContent = translations[currentLang].start;
        }

        function toggleTimer() {
            if (isRunning) pauseTimer();
            else startTimer();
        }

        // Керування ручним перемиканням етапів (Велика розтягнута кнопка)
        function handleNextStep() {
            playSound();
            if (isWorkPhase) {
                // Переходимо на відпочинок
                isWorkPhase = false;
                timeLeft = restTime;
            } else {
                // Переходимо на новий раунд
                isWorkPhase = true;
                currentRound++;
                timeLeft = workTime;
            }
            updateUI();
            // Якщо таймер працював, продовжуємо зворотний відлік автоматично на новому етапі
            if (isRunning && currentRound <= totalRounds) {
                clearInterval(timerId);
                timerId = setInterval(tick, 1000);
            }
        }

        // 7. Робота з налаштуваннями
        function loadSettings() {
            workTime = parseInt(inputWork.value) || 180;
            restTime = parseInt(inputRest.value) || 60;
            totalRounds = parseInt(inputRounds.value) || 12;
            
            // Скидаємо таймер на початок з новими параметрами
            currentRound = 1;
            isWorkPhase = true;
            timeLeft = workTime;
            updateUI();
        }

        // Перемикач мов
        function switchLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('boxingTimerLang', lang);

            if (lang === 'ua') {
                langUaBtn.classList.add('active');
                langEnBtn.classList.remove('active');
            } else {
                langEnBtn.classList.add('active');
                langUaBtn.classList.remove('active');
            }

            // Переклад модалки
            modalTitle.textContent = translations[lang].settingsTitle;
            labelWork.textContent = translations[lang].workLabel;
            labelRest.textContent = translations[lang].restLabel;
            labelRounds.textContent = translations[lang].roundsLabel;
            instructionTitle.textContent = translations[lang].instructionsTitle;
            instructionText.textContent = translations[lang].instruction;
            labelAuthor.textContent = translations[lang].authorLabel;
            nextStepBtn.textContent = translations[lang].nextBtn;
            
            if (isRunning) {
                playPauseBtn.textContent = translations[lang].pause;
            } else {
                playPauseBtn.textContent = translations[lang].start;
            }

            updateUI();
        }

        // 8. Події (EventListeners)
        playPauseBtn.addEventListener('click', toggleTimer);
        timeDisplay.addEventListener('click', toggleTimer); // Тап по цифрах теж ставить паузу
        nextStepBtn.addEventListener('click', handleNextStep);

        // Вікно налаштувань
        settingsBtn.addEventListener('click', () => {
            pauseTimer();
            settingsModal.classList.remove('hidden');
        });

        const closeModal = () => {
            loadSettings(); // При закритті автоматично зберігаємо і застосовуємо цифри
            settingsModal.classList.add('hidden');
        };

        closeModalBtn.addEventListener('click', closeModal);
        window.addEventListener('click', (e) => { if (e.target === settingsModal) closeModal(); });

        // Перемикачі мови
        langUaBtn.addEventListener('click', () => switchLanguage('ua'));
        langEnBtn.addEventListener('click', () => switchLanguage('en'));

        // Ініціалізація при старті сторінки
        const savedLang = localStorage.getItem('boxingTimerLang') || 'ua';
        switchLanguage(savedLang);
        loadSettings();
    </script>
</body>
</html>
